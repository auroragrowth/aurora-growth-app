name: Deploy Aurora Dev

on:
  push:
    branches:
      - dev

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.LIVE_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.LIVE_PORT }}" "${{ secrets.LIVE_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy dev on server
        run: |
          ssh -p "${{ secrets.LIVE_PORT }}" "${{ secrets.LIVE_USER }}@${{ secrets.LIVE_HOST }}" '/home/paul/deploy-aurora-dev.sh'
